<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso de Desarrollo - Hispania 210aC</title>
  <style>
    :root {
      --color-bg-dark: #1a1612;
      --color-accent-gold: #c5a059;
      --color-text-cream: #e8d5b5;
      --color-text-dim: #a89875;
      --color-border: #3d3428;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cinzel', 'Georgia', serif;
      background: linear-gradient(135deg, #0d0b09 0%, #1a1612 100%);
      color: var(--color-text-cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container { width: 100%; max-width: 420px; }

    .login-card {
      background: var(--color-bg-dark);
      border: 2px solid #7a3a3a;
      border-radius: 6px;
      padding: 45px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.7), inset 0 1px 0 rgba(180,80,80,0.1);
    }

    .dev-badge {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #a05050;
      border: 1px solid #7a3a3a;
      border-radius: 4px;
      padding: 4px 10px;
      margin-bottom: 20px;
      display: inline-block;
      width: 100%;
    }

    header { text-align: center; margin-bottom: 30px; }

    .logo-img {
      width: 100%;
      max-width: 380px;
      height: auto;
      margin-bottom: 4px;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.7));
    }

    .subtitle { font-size: 0.95em; color: var(--color-text-dim); letter-spacing: 0.5px; }

    .form-group { margin-bottom: 22px; }

    .form-group label {
      display: block;
      margin-bottom: 10px;
      color: var(--color-text-dim);
      font-size: 0.9em;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0,0,0,0.4);
      border: 2px solid var(--color-border);
      border-radius: 6px;
      color: var(--color-text-cream);
      font-size: 1em;
      transition: all 0.3s;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--color-accent-gold);
      box-shadow: 0 0 12px rgba(197,160,89,0.3);
      background: rgba(0,0,0,0.5);
    }

    button {
      padding: 16px 28px;
      background: var(--color-accent-gold);
      border: 2px solid rgba(197,160,89,0.3);
      border-radius: 6px;
      color: var(--color-bg-dark);
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      font-family: 'Cinzel', 'Georgia', serif;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      box-shadow: 0 4px 15px rgba(197,160,89,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(197,160,89,0.6); background: #d4b06a; }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .alert {
      padding: 16px;
      border-radius: 6px;
      margin-top: 18px;
      display: none;
      animation: slideIn 0.3s ease-out;
      border: 2px solid;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .alert.success { background: rgba(39,174,96,0.15); border-color: #27ae60; color: #2ecc71; }
    .alert.error   { background: rgba(231,76,60,0.15);  border-color: #e74c3c; color: #ff6b6b; }
    .alert.show    { display: block; }

    .footer-links { text-align: center; margin-top: 25px; }

    .footer-links a {
      color: var(--color-accent-gold);
      text-decoration: none;
      font-size: 0.9em;
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }

    .footer-links a:hover { color: #d4b06a; text-shadow: 0 0 8px rgba(197,160,89,0.4); }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="dev-badge">⚙ Acceso de Desarrollo</div>

      <header>
        <img src="/logo.png" alt="Hispania 210aC" class="logo-img" />
        <p class="subtitle">Acceso restringido</p>
      </header>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required autocomplete="current-password" />
        </div>

        <button type="submit" id="login-button">Iniciar Sesión</button>

        <div id="alert" class="alert"></div>
      </form>

      <div class="footer-links">
        <a href="/login.html">← Volver al login</a>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '';
    const form = document.getElementById('login-form');
    const loginButton = document.getElementById('login-button');
    const alertEl = document.getElementById('alert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showAlert('error', 'Por favor completa todos los campos');
        return;
      }

      try {
        loginButton.disabled = true;
        loginButton.textContent = 'Iniciando sesión...';

        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('user', JSON.stringify(data.user));
          showAlert('success', `¡Bienvenido, ${data.user.display_name || data.user.username}!`);

          try {
            const capitalResponse = await fetch(`${API_URL}/api/game/capital`, { credentials: 'include' });
            const capitalData = await capitalResponse.json();
            if (capitalData.success && capitalData.h3_index) {
              localStorage.setItem('capitalH3', capitalData.h3_index);
            }
          } catch (err) { /* ignorar */ }

          setTimeout(() => { window.location.href = '/'; }, 1000);
        } else {
          showAlert('error', data.message || 'Error al iniciar sesión');
          loginButton.disabled = false;
          loginButton.textContent = 'Iniciar Sesión';
        }
      } catch (error) {
        showAlert('error', 'Error de conexión con el servidor');
        loginButton.disabled = false;
        loginButton.textContent = 'Iniciar Sesión';
      }
    });

    function showAlert(type, message) {
      alertEl.className = `alert ${type} show`;
      alertEl.textContent = message;
      setTimeout(() => alertEl.classList.remove('show'), type === 'success' ? 3000 : 5000);
    }

    window.addEventListener('load', async () => {
      try {
        const response = await fetch(`${API_URL}/api/auth/me`, { credentials: 'include' });
        const data = await response.json();
        if (data.success) window.location.replace('/');
      } catch (e) { /* no hay sesión */ }
    });
  </script>
</body>
</html>
